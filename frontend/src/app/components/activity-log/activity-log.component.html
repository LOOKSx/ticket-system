<div class="activity-log">
  <div class="activity-log-header">
    <h2 class="activity-log-title">บันทึกกิจกรรม (Audit Trail)</h2>
  </div>

  <div *ngIf="loading" class="activity-log-state">
    <p>กำลังโหลดข้อมูล...</p>
  </div>

  <div *ngIf="!loading && logs.length === 0" class="activity-log-state muted">
    <p>ไม่พบประวัติกิจกรรม</p>
  </div>

  <div *ngIf="!loading && logs.length > 0" class="activity-log-card">
    <div class="activity-log-table-wrap">
      <table class="activity-log-table">
        <thead>
          <tr>
            <th>เวลา</th>
            <th>ผู้ใช้งาน</th>
            <th>บทบาท</th>
            <th>การกระทำ</th>
            <th>รายละเอียด</th>
            <th>หมายเลข IP</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let log of logs">
            <td class="mono">{{ log.CreatedAt | date:'medium' }}</td>
            <td>{{ log.user_name }}</td>
            <td>
              <span class="pill" [class.pill-admin]="log.role === 'Admin'" [class.pill-user]="log.role !== 'Admin'">
                {{ getThaiRole(log.role) }}
              </span>
            </td>
            <td>
              <span class="pill pill-neutral">{{ getThaiAction(log.action) }}</span>
            </td>
            <td class="wrap">{{ log.details }}</td>
            <td class="mono">{{ log.ip_address }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
